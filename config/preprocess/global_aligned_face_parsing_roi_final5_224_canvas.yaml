# Default config for preprocessing/preprocess_global_aligned_face_parsing_roi_dataset_224_canvas.py
# Paths are resolved relative to project_root.

project_root: .

# Input / output
split_csv: data/processed/splits_500/nyha_3class_sex_stratified_group_5fold.csv
image_dir: data/raw/images
output_dir: data/processed/roi_dataset/global_aligned_face_parsing_roi_final5_224_canvas_500
global_intermediate_dir: data/processed/global_face/global_face_parsing_hybrid_foreheadrepair_blackbg_224_png_strict/intermediates

# Runtime
save_intermediates: false
overwrite: false
max_samples: null
seed: 42
num_qc_preview: 20

# Parsing / alignment
parsing_model: bisenet
parsing_checkpoint: preprocessing/checkpoints/face_parsing/79999_iter.pth
parsing_device: auto
min_detection_confidence: 0.5

# Image / ROI output
image_size: 224
canvas_size: 224
roi_types:
  - eye_roi
  - lip_roi
  - cheek_roi
  - forehead_roi
  - chin_roi
core_roi_types:
  - eye_roi
  - lip_roi
  - cheek_roi
  - forehead_roi
  - chin_roi
padding_color: [0, 0, 0]
keep_aspect_ratio: true
output_format: png
min_roi_width: 8
min_roi_height: 8

# Global-mask settings. These mirror the current hybrid global preprocessing logic.
final_mask_mode: hybrid
forehead_band_ratio: 0.35
hair_repair_threshold: 0.10
jaggedness_threshold: 0.04
enable_jaggedness_trigger: false
forehead_expand_ratio: 0.15
side_expand_ratio: 0.04
chin_expand_ratio: 0.02

# QC warning thresholds. They only write warning flags; they do not delete samples.
max_padding_ratio: 0.60
max_background_ratio: 0.20
max_cloth_ratio: 0.05
max_neck_ratio: 0.05
forehead_hair_warning: 0.30
cheek_background_warning: 0.15
eye_nose_warning: 0.10
chin_neck_warning: 0.10
chin_cloth_warning: 0.05
