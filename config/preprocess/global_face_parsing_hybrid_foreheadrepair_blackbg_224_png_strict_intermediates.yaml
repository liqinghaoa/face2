# Paths are resolved relative to project_root.
project_root: .
split_csv: data\raw\label_raw.csv
image_dir: data/raw/images
output_dir: data/processed/global_face/global_face_parsing_hybrid_foreheadrepair_blackbg_224_png_strict_intermediates

image_size: 224
min_detection_confidence: 0.5

parsing_model: bisenet
parsing_checkpoint: preprocessing/checkpoints/face_parsing/79999_iter.pth
parsing_device: auto

final_mask_mode: hybrid
forehead_band_ratio: 0.35
hair_repair_threshold: 0.10
jaggedness_threshold: 0.04
enable_jaggedness_trigger: false

hair_warning: 0.10
heavy_hair_warning: 0.20
mask_low_warning: 0.35
mask_high_warning: 0.85

# Retained only for the candidate envelope used by forehead repair.
forehead_expand_ratio: 0.18
side_expand_ratio: 0.05
chin_expand_ratio: 0.03
feather_kernel: 11

num_qc_preview: 20
max_samples: null
seed: 42
save_intermediates: true
overwrite: false
